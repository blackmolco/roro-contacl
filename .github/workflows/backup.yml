name: Backup Firestore a GitHub

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 03:00 Chile (horario invierno)
    - cron: '0 5 * * *'   # 05:00 UTC = 02:00 Chile (horario verano)
  workflow_dispatch:        # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  backup:
    name: Exportar Firestore y guardar en repositorio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Instalar dependencias
        working-directory: scripts
        run: npm ci

      - name: Ejecutar exportación de Firestore
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: contabilidad-roro
        run: node backup-firestore.js

      - name: Commit y push del backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Sin cambios en el backup, no se crea commit."
          else
            FECHA=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "backup: exportación automática Firestore ${FECHA}"
            git push origin main
          fi
